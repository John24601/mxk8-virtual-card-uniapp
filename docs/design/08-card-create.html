<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>设计图 - 创建卡片 | MXK8 虚拟卡</title>
        <link rel="stylesheet" href="common.css" />
    </head>
    <body>
        <a class="back-link" href="index.html">← 返回设计图索引</a>
        <div class="wireframe">
            <header class="wireframe-header">← 返回 &nbsp; 创建卡片</header>
            <main class="wireframe-main">
                <div class="block">
                    <div class="block-label">卡段选择 (cardBin, cardPermissions)</div>
                    <div class="form-row"><div class="mock-input">请选择卡段</div></div>
                </div>
                <div class="block">
                    <div class="block-label">持卡人信息</div>
                    <div class="form-row"><div class="mock-input">姓 (firstName)</div></div>
                    <div class="form-row"><div class="mock-input">名 (lastName)</div></div>
                    <div class="form-row"><div class="mock-input">账单地址 (billingAddress)</div></div>
                    <div class="grid2">
                        <div class="form-row"><div class="mock-input">城市</div></div>
                        <div class="form-row"><div class="mock-input">州</div></div>
                    </div>
                    <div class="form-row"><div class="mock-input">邮编 (zipCode)</div></div>
                </div>
                <div class="block">
                    <div class="block-label">联系与额度</div>
                    <div class="form-row"><div class="mock-input">email / phone / birthDate</div></div>
                    <div class="form-row"><div class="mock-input">额度 (amount) | 有效期 (expiryDate)</div></div>
                </div>
                <button class="mock-btn">提交创建</button>
            </main>
        </div>
    </body>
</html>
