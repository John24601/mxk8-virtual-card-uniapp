<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>设计图 - 登录页 | MXK8 虚拟卡</title>
        <link rel="stylesheet" href="common.css" />
    </head>
    <body>
        <a class="back-link" href="index.html">← 返回设计图索引</a>
        <div class="wireframe">
            <header class="wireframe-header">导航栏 / 标题或 Logo（登录）</header>
            <main class="wireframe-main">
                <div class="block">
                    <div class="block-label">账号输入框 (username)</div>
                    <div class="form-row"><div class="mock-input">请输入账号</div></div>
                </div>
                <div class="block">
                    <div class="block-label">密码输入框 (password)</div>
                    <div class="form-row"><div class="mock-input">••••••••</div></div>
                </div>
                <div class="block">
                    <div class="block-label">图形验证码 + 输入框</div>
                    <div class="form-row" style="display: flex; gap: 8px; align-items: center">
                        <div class="mock-input" style="flex: 1">验证码</div>
                        <div
                            style="
                                border: 1px solid #999;
                                width: 80px;
                                height: 36px;
                                background: #eee;
                                text-align: center;
                                line-height: 36px;
                            "
                        >
                            图
                        </div>
                    </div>
                </div>
                <button class="mock-btn">登录</button>
            </main>
        </div>
    </body>
</html>
