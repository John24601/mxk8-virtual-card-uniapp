<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>设计图 - 修改密码 | MXK8 虚拟卡</title>
        <link rel="stylesheet" href="common.css" />
    </head>
    <body>
        <a class="back-link" href="index.html">← 返回设计图索引</a>
        <div class="wireframe">
            <header class="wireframe-header">← 返回 &nbsp; 修改密码</header>
            <main class="wireframe-main">
                <div class="block">
                    <div class="block-label">当前密码 (currentPassword)</div>
                    <div class="form-row"><div class="mock-input">••••••••</div></div>
                </div>
                <div class="block">
                    <div class="block-label">新密码 (password)</div>
                    <div class="form-row"><div class="mock-input">请输入新密码</div></div>
                </div>
                <div class="block">
                    <div class="block-label">确认新密码</div>
                    <div class="form-row"><div class="mock-input">请再次输入</div></div>
                </div>
                <button class="mock-btn">提交</button>
            </main>
        </div>
    </body>
</html>
