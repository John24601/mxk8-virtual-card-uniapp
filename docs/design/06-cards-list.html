<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>设计图 - 卡片列表 | MXK8 虚拟卡</title>
        <link rel="stylesheet" href="common.css" />
    </head>
    <body>
        <a class="back-link" href="index.html">← 返回设计图索引</a>
        <div class="wireframe">
            <header class="wireframe-header">我的卡片 &nbsp; [创建卡片]</header>
            <main class="wireframe-main">
                <div class="block">
                    <div class="block-label">卡片项 1</div>
                    <div>卡号掩码：**** **** **** 1234</div>
                    <div>类型 | 可用额度/总额度 | 状态：正常</div>
                    <div style="margin-top: 8px; display: flex; gap: 8px">
                        <span class="tab">激活/禁用</span><span class="tab">充值</span><span class="tab">详情</span>
                    </div>
                </div>
                <div class="block">
                    <div class="block-label">卡片项 2</div>
                    <div>卡号掩码：**** **** **** 5678</div>
                    <div>类型 | 可用额度/总额度 | 状态：禁用</div>
                    <div style="margin-top: 8px; display: flex; gap: 8px">
                        <span class="tab">激活/禁用</span><span class="tab">充值</span><span class="tab">详情</span>
                    </div>
                </div>
                <div class="block" style="border-style: dashed">
                    <div class="block-label">充值弹窗（快捷 50/100/200/500，最低 50 美元）</div>
                    <div class="grid4">
                        <span class="tab">50</span><span class="tab">100</span><span class="tab">200</span
                        ><span class="tab">500</span>
                    </div>
                    <div class="form-row"><div class="mock-input">自定义金额</div></div>
                    <button class="mock-btn">确认充值</button>
                </div>
            </main>
        </div>
    </body>
</html>
