<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>设计图 - 首页 | MXK8 虚拟卡</title>
        <link rel="stylesheet" href="common.css" />
    </head>
    <body>
        <a class="back-link" href="index.html">← 返回设计图索引</a>
        <div class="wireframe">
            <header class="wireframe-header">导航栏 / 首页</header>
            <main class="wireframe-main">
                <div class="block">
                    <div class="block-label">余额区（支持显隐）</div>
                    <div>可用余额：****** &nbsp; 卡片总余额：******</div>
                </div>
                <div class="block">
                    <div class="block-label">收支统计</div>
                    <div class="tab-row">
                        <span class="tab">7天</span><span class="tab">30天</span><span class="tab">90天</span>
                    </div>
                    <div>收入：**** &nbsp; 支出：****</div>
                </div>
                <div class="block">
                    <div class="block-label">快捷入口（4 宫格）</div>
                    <div class="grid4">
                        <div class="block">我的卡片</div>
                        <div class="block">交易记录</div>
                        <div class="block">资金流水</div>
                        <div class="block">个人中心</div>
                    </div>
                </div>
                <div class="block">
                    <div class="block-label">最近交易（最多 5 条）</div>
                    <div class="list-item">类型 | 金额 | 时间 | 状态</div>
                    <div class="list-item">类型 | 金额 | 时间 | 状态</div>
                    <div class="list-item">...</div>
                </div>
            </main>
            <footer class="wireframe-footer"><span>首页</span><span>卡片</span><span>我的</span></footer>
        </div>
    </body>
</html>
